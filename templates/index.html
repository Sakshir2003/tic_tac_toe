<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        #status {
            margin: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 110px;
            height: 110px;
            background: white;
            color: #333;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .cell:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }

        .disabled {
            background: #ccc !important;
            cursor: not-allowed;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff4757;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        button:hover {
            background: #e84118;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>
<div id="status">Player X's Turn</div>

<div class="grid" id="board"></div>

<button onclick="restartGame()">🔄 Restart Game</button>

<script>
let boardDiv = document.getElementById("board");
let statusDiv = document.getElementById("status");
let cells = [];
let gameOver = false;

function createBoard() {
    boardDiv.innerHTML = "";
    cells = [];
    gameOver = false;

    for (let i = 0; i < 9; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.onclick = () => makeMove(i);
        boardDiv.appendChild(cell);
        cells.push(cell);
    }

    statusDiv.innerText = "Player X's Turn";
}

function makeMove(index) {
    if (gameOver || cells[index].innerText !== "") return;

    fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({index: index})
    })
    .then(res => res.json())
    .then(data => {

        updateBoard(data.board);

        if (data.status === "continue") {
            statusDiv.innerText = "Player " + data.player + "'s Turn";
        } 
        else if (data.status === "win") {
            statusDiv.innerText = "🎉 Player " + data.winner + " Wins!";
            gameOver = true;
            disableBoard();
        } 
        else if (data.status === "tie") {
            statusDiv.innerText = "🤝 It's a Tie!";
            gameOver = true;
            disableBoard();
        } 
        else {
            alert("Invalid move!");
        }
    });
}

function updateBoard(board) {
    for (let i = 0; i < board.length; i++) {
        cells[i].innerText = board[i];
    }
}

function disableBoard() {
    cells.forEach(cell => cell.classList.add("disabled"));
}

function restartGame() {
    fetch("/restart")
    .then(() => createBoard());
}

createBoard();
</script>

</body>
</html>
